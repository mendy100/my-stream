<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f0f2ff">
<link rel="manifest" href="/manifest.json">
<title>Control Panel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f0f2ff 0%, #e8f4f8 50%, #fef3f0 100%);
    color: #1a1a2e;
    min-height: 100vh;
    padding: 1rem;
    padding-bottom: 2rem;
    -webkit-user-select: none;
    user-select: none;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 800;
    text-align: center;
    margin-bottom: 1rem;
    color: #2d2b55;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 1rem;
    margin-bottom: 0.7rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .card-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #8888aa;
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 600;
  }

  /* Status dots */
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ccc;
    display: inline-block;
    flex-shrink: 0;
  }
  .dot.green { background: #22c55e; box-shadow: 0 0 8px #22c55e66; }
  .dot.red { background: #ef4444; box-shadow: 0 0 8px #ef444466; }
  .dot.yellow { background: #f59e0b; box-shadow: 0 0 8px #f59e0b66; }

  /* Pi status */
  .status-text { font-size: 0.9rem; font-weight: 600; color: #1a1a2e; }
  .status-detail { color: #999; font-size: 0.75rem; }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.4rem;
    margin-top: 0.5rem;
  }
  .info-item {
    background: #f7f8fc;
    border-radius: 10px;
    padding: 0.45rem 0.6rem;
  }
  .info-label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; font-weight: 600; }
  .info-value { font-size: 0.82rem; margin-top: 0.1rem; font-weight: 500; color: #333; }

  /* Banner */
  .banner {
    display: none;
    border-radius: 12px;
    padding: 0.7rem;
    margin-bottom: 0.7rem;
    text-align: center;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .banner.error {
    background: #fef2f2;
    border: 2px solid #fca5a5;
    color: #dc2626;
  }

  /* Listeners */
  .big-number {
    text-align: center;
    font-size: 2.4rem;
    font-weight: 800;
    line-height: 1;
    color: #4f46e5;
  }
  .big-label {
    text-align: center;
    color: #aaa;
    font-size: 0.75rem;
    margin-top: 0.2rem;
    font-weight: 500;
  }

  /* Buttons */
  .listen-btn {
    width: 100%;
    padding: 1rem;
    font-size: 1.05rem;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.1s;
    background: linear-gradient(135deg, #d1fae5, #a7f3d0);
    color: #065f46;
  }
  .listen-btn:active { transform: scale(0.97); }
  .listen-btn.playing {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #fff;
  }

  .talk-btn {
    width: 100%;
    padding: 1rem;
    font-size: 1.05rem;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.1s;
    background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
    color: #3730a3;
  }
  .talk-btn:active { transform: scale(0.97); }
  .talk-btn.talking {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: #fff;
    animation: talkPulse 1.5s infinite;
  }
  @keyframes talkPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.25); }
    50% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
  }

  /* Level meter */
  .meter {
    height: 5px;
    background: #eee;
    border-radius: 3px;
    margin-top: 0.5rem;
    overflow: hidden;
    display: none;
  }
  .meter.active { display: block; }
  .meter-bar {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    background: #22c55e;
    transition: width 0.05s;
  }

  /* WiFi */
  .wifi-item {
    display: flex;
    align-items: center;
    padding: 0.55rem 0.7rem;
    background: #f7f8fc;
    border-radius: 10px;
    margin-bottom: 0.3rem;
    font-size: 0.85rem;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s;
  }
  .wifi-item:active { background: #eef0f8; }
  .wifi-item .ssid { flex: 1; font-weight: 500; color: #333; }
  .wifi-signal {
    font-size: 0.7rem;
    color: #888;
    margin-left: 0.4rem;
    background: #eee;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
  }
  .wifi-security {
    font-size: 0.6rem;
    color: #aaa;
    margin-left: 0.3rem;
  }
  .wifi-connected {
    font-size: 0.6rem;
    background: #d1fae5;
    color: #065f46;
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    margin-left: 0.4rem;
    font-weight: 600;
  }
  .wifi-remove {
    background: none;
    border: none;
    color: #ef4444;
    font-size: 0.85rem;
    cursor: pointer;
    padding: 0.2rem 0.4rem;
    width: auto;
    border-radius: 6px;
  }
  .wifi-remove:active { background: #fef2f2; }

  .wifi-connect-form {
    display: none;
    margin-top: 0.5rem;
    padding: 0.7rem;
    background: #f0f2ff;
    border-radius: 12px;
  }
  .wifi-connect-form label {
    font-size: 0.8rem;
    font-weight: 600;
    color: #4f46e5;
    display: block;
    margin-bottom: 0.4rem;
  }
  .wifi-form-row {
    display: flex;
    gap: 0.4rem;
  }
  .wifi-form-row input {
    flex: 1;
    padding: 0.55rem;
    font-size: 0.9rem;
    border: 2px solid #ddd;
    border-radius: 10px;
    background: #fff;
    color: #333;
    outline: none;
  }
  .wifi-form-row input:focus { border-color: #4f46e5; }
  .wifi-form-row button {
    padding: 0.55rem 1rem;
    font-size: 0.85rem;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    background: #4f46e5;
    color: #fff;
    cursor: pointer;
    white-space: nowrap;
    width: auto;
  }
  .wifi-form-row button:active { background: #4338ca; }

  .scan-btn {
    background: none;
    border: none;
    color: #4f46e5;
    font-size: 0.7rem;
    cursor: pointer;
    font-weight: 600;
    width: auto;
  }

  .empty-msg {
    color: #bbb;
    font-size: 0.8rem;
    text-align: center;
    padding: 0.5rem;
  }
</style>
</head>
<body>

<h1>Control Panel</h1>

<div class="banner error" id="connection-lost">Connection lost - reconnecting...</div>

<!-- Pi Status -->
<div class="card">
  <div class="card-title">
    Raspberry Pi
    <div class="dot" id="pi-dot"></div>
  </div>
  <div class="status-text" id="pi-status-text">Checking...</div>
  <div class="status-detail" id="pi-status-detail"></div>
  <div class="info-grid" id="pi-info" style="display:none">
    <div class="info-item">
      <div class="info-label">Connection</div>
      <div class="info-value" id="pi-conn-type">-</div>
    </div>
    <div class="info-item">
      <div class="info-label">Signal</div>
      <div class="info-value" id="pi-signal">-</div>
    </div>
    <div class="info-item">
      <div class="info-label">Network</div>
      <div class="info-value" id="pi-ssid">-</div>
    </div>
    <div class="info-item">
      <div class="info-label">Uptime</div>
      <div class="info-value" id="pi-uptime">-</div>
    </div>
  </div>
</div>

<!-- Listeners -->
<div class="card">
  <div class="card-title">Listeners</div>
  <div class="big-number" id="listener-count">0</div>
  <div class="big-label">connected</div>
</div>

<!-- Listen + Talk side by side -->
<div style="display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin-bottom:0.7rem">
  <div class="card" style="margin-bottom:0">
    <div class="card-title">Monitor</div>
    <button class="listen-btn" id="listen-btn">Hold to Listen</button>
  </div>
  <div class="card" style="margin-bottom:0">
    <div class="card-title">Talk</div>
    <button class="talk-btn" id="talk-btn">Hold to Talk</button>
    <div class="meter" id="meter">
      <div class="meter-bar" id="meter-bar"></div>
    </div>
  </div>
</div>

<!-- WiFi -->
<div class="card">
  <div class="card-title">
    WiFi Networks
    <button class="scan-btn" id="wifi-scan-btn">Scan</button>
  </div>

  <!-- Saved networks -->
  <div id="wifi-saved"></div>

  <!-- Scan results -->
  <div id="scan-list"></div>

  <!-- Connect form -->
  <div class="wifi-connect-form" id="wifi-connect-form">
    <label id="wifi-connect-label">Connect to network</label>
    <div class="wifi-form-row">
      <input type="password" id="wifi-connect-pass" placeholder="Password">
      <button id="wifi-connect-btn">Connect</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function() {
  const connectionLost = document.getElementById('connection-lost');
  const piDot = document.getElementById('pi-dot');
  const piStatusText = document.getElementById('pi-status-text');
  const piStatusDetail = document.getElementById('pi-status-detail');
  const piInfo = document.getElementById('pi-info');
  const piConnType = document.getElementById('pi-conn-type');
  const piSignal = document.getElementById('pi-signal');
  const piSsid = document.getElementById('pi-ssid');
  const piUptime = document.getElementById('pi-uptime');
  const listenerCount = document.getElementById('listener-count');
  const listenBtn = document.getElementById('listen-btn');
  const talkBtn = document.getElementById('talk-btn');
  const meter = document.getElementById('meter');
  const meterBar = document.getElementById('meter-bar');
  const wifiSaved = document.getElementById('wifi-saved');
  const scanList = document.getElementById('scan-list');
  const wifiScanBtn = document.getElementById('wifi-scan-btn');
  const wifiConnectForm = document.getElementById('wifi-connect-form');
  const wifiConnectLabel = document.getElementById('wifi-connect-label');
  const wifiConnectPass = document.getElementById('wifi-connect-pass');
  const wifiConnectBtn = document.getElementById('wifi-connect-btn');

  let socket = null;
  let isTalking = false;
  let audioCtx = null;
  let mediaStream = null;
  let processor = null;
  let audioPlayer = null;
  let isListening = false;
  let selectedSsid = '';

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // --- Socket ---
  socket = io({ query: { broadcaster: '1', type: 'control' } });
  socket.on('connect', () => {
    socket.emit('start-broadcast', 'auto');
    connectionLost.style.display = 'none';
    setTimeout(loadSavedWifi, 1000);
  });
  socket.on('listeners', (n) => { listenerCount.textContent = n; });
  socket.on('pi-status', updatePiStatus);
  socket.on('disconnect', () => { connectionLost.style.display = 'block'; });
  socket.on('reconnect', () => {
    connectionLost.style.display = 'none';
    socket.emit('start-broadcast', 'auto');
  });

  // --- Pi Status ---
  let piTimeout = null;
  function updatePiStatus(info) {
    clearTimeout(piTimeout);
    if (!info) {
      piDot.className = 'dot red';
      piStatusText.textContent = 'Disconnected';
      piStatusDetail.textContent = 'Pi is not connected';
      piInfo.style.display = 'none';
      return;
    }
    piDot.className = 'dot green';
    piStatusText.textContent = 'Connected & Streaming';
    piStatusDetail.textContent = 'Audio: ' + (info.device || 'unknown');
    piInfo.style.display = 'grid';
    const net = info.network || {};
    piConnType.textContent = net.type === 'wifi' ? 'WiFi' : net.type === 'ethernet' ? 'Ethernet' : net.type || '-';
    if (net.type === 'wifi' && net.signal) {
      const dbm = parseInt(net.signal);
      let q = 'Excellent'; if (dbm < -80) q = 'Weak'; else if (dbm < -70) q = 'Fair'; else if (dbm < -60) q = 'Good';
      piSignal.textContent = dbm + ' dBm (' + q + ')';
    } else {
      piSignal.textContent = net.type === 'ethernet' ? 'Wired' : '-';
    }
    piSsid.textContent = net.ssid || (net.type === 'ethernet' ? 'Wired' : '-');
    if (info.uptime) {
      const h = Math.floor(info.uptime / 3600);
      const m = Math.floor((info.uptime % 3600) / 60);
      piUptime.textContent = h > 0 ? h + 'h ' + m + 'm' : m + 'm';
    }
    piTimeout = setTimeout(() => {
      piDot.className = 'dot yellow';
      piStatusText.textContent = 'No recent update';
      piStatusDetail.textContent = 'Pi may have lost connection';
    }, 12000);
  }

  // --- Listen ---
  listenBtn.addEventListener('touchstart', startListening, { passive: true });
  listenBtn.addEventListener('touchend', stopListening);
  listenBtn.addEventListener('touchcancel', stopListening);
  listenBtn.addEventListener('mousedown', startListening);
  listenBtn.addEventListener('mouseup', stopListening);
  listenBtn.addEventListener('mouseleave', stopListening);

  function startListening() {
    if (isListening) return;
    audioPlayer = new Audio('/stream');
    audioPlayer.play().catch(() => {});
    isListening = true;
    listenBtn.textContent = 'Listening...';
    listenBtn.classList.add('playing');
  }
  function stopListening() {
    if (!isListening) return;
    if (audioPlayer) { audioPlayer.pause(); audioPlayer.src = ''; audioPlayer = null; }
    isListening = false;
    listenBtn.textContent = 'Hold to Listen';
    listenBtn.classList.remove('playing');
  }

  // --- Talk ---
  talkBtn.addEventListener('touchstart', startTalking, { passive: true });
  talkBtn.addEventListener('touchend', stopTalking);
  talkBtn.addEventListener('touchcancel', stopTalking);
  talkBtn.addEventListener('mousedown', startTalking);
  talkBtn.addEventListener('mouseup', stopTalking);
  talkBtn.addEventListener('mouseleave', stopTalking);

  async function startTalking() {
    if (isTalking) return;
    isTalking = true;
    talkBtn.classList.add('talking');
    talkBtn.textContent = 'Talking...';
    meter.classList.add('active');
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioCtx = new AudioContext();
      const source = audioCtx.createMediaStreamSource(mediaStream);
      const analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      processor = audioCtx.createScriptProcessor(1024, 1, 1);
      const ratio = Math.round(audioCtx.sampleRate / 16000);
      processor.onaudioprocess = (e) => {
        if (!isTalking || !socket) return;
        const input = e.inputBuffer.getChannelData(0);
        e.outputBuffer.getChannelData(0).fill(0);
        const outLen = Math.floor(input.length / ratio);
        const buf = new Int16Array(outLen);
        for (let i = 0; i < outLen; i++) {
          let s = Math.max(-1, Math.min(1, input[i * ratio]));
          buf[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        socket.emit('audio', buf.buffer);
      };
      source.connect(analyser);
      source.connect(processor);
      const silent = audioCtx.createGain();
      silent.gain.value = 0;
      processor.connect(silent);
      silent.connect(audioCtx.destination);
      const arr = new Uint8Array(analyser.frequencyBinCount);
      (function tick() {
        if (!isTalking) return;
        analyser.getByteFrequencyData(arr);
        let sum = 0; for (let i = 0; i < arr.length; i++) sum += arr[i];
        const pct = Math.min(100, (sum / arr.length / 128) * 100);
        meterBar.style.width = pct + '%';
        meterBar.style.background = pct > 80 ? '#ef4444' : pct > 50 ? '#f59e0b' : '#22c55e';
        requestAnimationFrame(tick);
      })();
    } catch (err) {
      alert('Could not access microphone');
      stopTalking();
    }
  }
  function stopTalking() {
    if (!isTalking) return;
    isTalking = false;
    talkBtn.classList.remove('talking');
    talkBtn.textContent = 'Hold to Talk';
    meter.classList.remove('active');
    if (processor) { processor.disconnect(); processor = null; }
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  }

  // --- WiFi Saved ---
  async function loadSavedWifi() {
    try {
      const res = await fetch('/api/wifi');
      if (!res.ok) { wifiSaved.innerHTML = ''; return; }
      const data = await res.json();
      if (!data.networks || data.networks.length === 0) {
        wifiSaved.innerHTML = '';
        return;
      }
      wifiSaved.innerHTML = data.networks.map(n =>
        '<div class="wifi-item">' +
          '<span class="ssid">' + esc(n.ssid) + '</span>' +
          (n.active ? '<span class="wifi-connected">Connected</span>' : '') +
          '<button class="wifi-remove" data-ssid="' + esc(n.ssid) + '">x</button>' +
        '</div>'
      ).join('');
      wifiSaved.querySelectorAll('.wifi-item').forEach(item => {
        const ssid = item.querySelector('.ssid').textContent;
        const isConnected = !!item.querySelector('.wifi-connected');
        if (!isConnected) {
          item.style.cursor = 'pointer';
          item.addEventListener('click', async (e) => {
            if (e.target.classList.contains('wifi-remove')) return;
            item.querySelector('.ssid').textContent = 'Switching...';
            const ok = await connectToWifi(ssid, '', true);
            if (!ok) item.querySelector('.ssid').textContent = ssid;
            else loadSavedWifi();
          });
        }
      });
      wifiSaved.querySelectorAll('.wifi-remove').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!confirm('Remove "' + btn.dataset.ssid + '"?')) return;
          await fetch('/api/wifi/' + encodeURIComponent(btn.dataset.ssid), { method: 'DELETE' });
          loadSavedWifi();
        });
      });
    } catch (e) {}
  }

  // --- WiFi Scan ---
  wifiScanBtn.addEventListener('click', async () => {
    wifiScanBtn.textContent = 'Scanning...';
    scanList.innerHTML = '<div class="empty-msg">Scanning nearby networks...</div>';
    wifiConnectForm.style.display = 'none';
    try {
      const res = await fetch('/api/wifi/scan');
      const data = await res.json();
      if (!data.networks || data.networks.length === 0) {
        scanList.innerHTML = '<div class="empty-msg">No networks found</div>';
      } else {
        scanList.innerHTML = data.networks.map(n =>
          '<div class="wifi-item" data-ssid="' + esc(n.ssid) + '" data-open="' + (n.open ? '1' : '0') + '">' +
            '<span class="ssid">' + esc(n.ssid) + '</span>' +
            '<span class="wifi-signal">' + n.signal + '%</span>' +
            '<span class="wifi-security">' + (n.open ? '<span style="color:#22c55e">Open</span>' : esc(n.security)) + '</span>' +
          '</div>'
        ).join('');
        scanList.querySelectorAll('.wifi-item').forEach(item => {
          item.addEventListener('click', async () => {
            const ssid = item.dataset.ssid;
            // Check if already connected
            const connBadge = wifiSaved.querySelector('.wifi-connected');
            if (connBadge && connBadge.parentElement.querySelector('.ssid').textContent === ssid) return;

            scanList.querySelectorAll('.wifi-item').forEach(i => i.style.borderColor = 'transparent');
            item.style.borderColor = '#4f46e5';

            if (item.dataset.open === '1') {
              const origText = item.querySelector('.ssid').textContent;
              item.querySelector('.ssid').textContent = 'Connecting...';
              await connectToWifi(ssid, '');
              item.querySelector('.ssid').textContent = origText;
            } else {
              selectedSsid = ssid;
              wifiConnectLabel.textContent = 'Connect to ' + ssid;
              wifiConnectPass.value = '';
              wifiConnectForm.style.display = 'block';
              wifiConnectPass.focus();
            }
          });
        });
      }
    } catch (e) {
      scanList.innerHTML = '<div class="empty-msg">Scan failed - Pi not reachable</div>';
    }
    wifiScanBtn.textContent = 'Scan';
  });

  async function connectToWifi(ssid, password, silent) {
    try {
      const res = await fetch('/api/wifi', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ssid, password }),
      });
      const data = await res.json();
      if (data.success) {
        wifiConnectForm.style.display = 'none';
        selectedSsid = '';
        loadSavedWifi();
        return true;
      } else if (data.error === 'need-password') {
        selectedSsid = ssid;
        wifiConnectLabel.textContent = 'Password needed for ' + ssid;
        wifiConnectPass.value = '';
        wifiConnectForm.style.display = 'block';
        wifiConnectPass.focus();
        return false;
      } else {
        if (!silent) alert(data.error || 'Connection failed');
        return false;
      }
    } catch (e) {
      if (!silent) alert('Failed to connect');
      return false;
    }
  }

  wifiConnectBtn.addEventListener('click', async () => {
    if (!selectedSsid) return;
    wifiConnectBtn.textContent = 'Connecting...';
    await connectToWifi(selectedSsid, wifiConnectPass.value);
    wifiConnectBtn.textContent = 'Connect';
  });

})();
</script>
</body>
</html>
