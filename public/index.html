<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f0f2ff">
<title>Live Stream</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f0f2ff 0%, #e8f4f8 50%, #fef3f0 100%);
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .container {
    text-align: center;
    max-width: 420px;
    width: 100%;
  }
  .logo {
    width: 80px;
    height: 80px;
    border-radius: 24px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    margin: 0 auto 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 30px rgba(99,102,241,0.25);
  }
  .logo svg { width: 40px; height: 40px; fill: #fff; }
  h1 {
    font-size: 1.6rem;
    font-weight: 800;
    color: #2d2b55;
    margin-bottom: 0.3rem;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 1.5rem;
  }
  .player-card {
    background: #fff;
    border-radius: 20px;
    padding: 1.5rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    background: #f0fdf4;
    color: #16a34a;
  }
  .status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    animation: pulse 2s infinite;
  }
  .status.offline { background: #fef2f2; color: #dc2626; }
  .status.offline .dot { background: #ef4444; animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .play-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    box-shadow: 0 6px 24px rgba(99,102,241,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .play-btn:active { transform: scale(0.95); }
  .play-btn:hover { box-shadow: 0 8px 32px rgba(99,102,241,0.4); }
  .play-btn svg { width: 28px; height: 28px; fill: #fff; }
  .play-btn.playing {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    box-shadow: 0 6px 24px rgba(239,68,68,0.3);
  }
  .play-label {
    font-size: 0.8rem;
    color: #999;
    font-weight: 500;
  }
  .listeners-info {
    margin-top: 1rem;
    padding-top: 0.8rem;
    border-top: 1px solid #f0f0f0;
    font-size: 0.75rem;
    color: #bbb;
  }
  .listeners-info span { color: #4f46e5; font-weight: 700; }
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
  </div>
  <h1>Live Stream</h1>
  <p class="subtitle">Tap play to start listening</p>

  <div class="player-card">
    <div class="status" id="status">
      <div class="dot"></div>
      <span>Live</span>
    </div>
    <br>
    <button class="play-btn" id="play-btn">
      <svg id="play-icon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
    </button>
    <div class="play-label" id="play-label">Tap to play</div>
    <div class="listeners-info"><span id="listener-count">0</span> listeners</div>
  </div>
</div>

<audio id="player" preload="none" src="/stream"></audio>
<script src="/socket.io/socket.io.js"></script>
<script>
(function() {
  const player = document.getElementById('player');
  const playBtn = document.getElementById('play-btn');
  const playIcon = document.getElementById('play-icon');
  const playLabel = document.getElementById('play-label');
  const status = document.getElementById('status');
  const listenerCount = document.getElementById('listener-count');
  let playing = false;

  const socket = io({ query: { broadcaster: '0' } });
  socket.on('status', (s) => {
    if (s.live) {
      status.className = 'status';
      status.querySelector('span').textContent = 'Live';
    } else {
      status.className = 'status offline';
      status.querySelector('span').textContent = 'Offline';
    }
  });
  socket.on('listeners', (n) => { listenerCount.textContent = n; });

  playBtn.addEventListener('click', () => {
    if (!playing) {
      player.src = '/stream';
      player.play().catch(() => {});
      playing = true;
      playBtn.classList.add('playing');
      playIcon.innerHTML = '<rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/>';
      playLabel.textContent = 'Playing...';
    } else {
      player.pause();
      player.src = '';
      playing = false;
      playBtn.classList.remove('playing');
      playIcon.innerHTML = '<polygon points="6,3 20,12 6,21"/>';
      playLabel.textContent = 'Tap to play';
    }
  });
})();
</script>
</body>
</html>
